#CHAT_TOKEN_URL CHAT_TOKEN_ID_SEDINAM CHAT_TOKEN
 

name: sikanti

on:
  schedule:
    # Runs at 9:00 AM UTC (9:00 AM GMT) daily.
    - cron: '0 9 * * *'
  workflow_dispatch: # This allows you to trigger the bot manually for testing.

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Run Script
        env:
          chat: ${{ secrets.CHAT_TOKEN }}
          sedinam: ${{ secrets.CHAT_TOKEN_ID_SEDINAM }}
          sanbenito: ${{ secrets.CHAT_TOKEN_ID_SANBENITO }}
          wenow_url : ${{ secrets.CHAT_TOKEN_URL }}
        run: python sika_script.py
